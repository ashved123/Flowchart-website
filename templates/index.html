<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logiflow</title>
    <style>
        .create-box {
            width: 100px;
            height: 70px;
            background: #1a0030;
            border: 2px solid #3d0060;
            border-radius: 10%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
        }
        body {
            margin: 0;
            font-family: sans-serif;
            background: #0d0d0f;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="create-box">+</div>
    <h1>Logiflow</h1>
    <p>Your logic-based flowchart tool — coming soon.</p>
    <script>
        document.querySelector(".create-box").addEventListener("click", function() {
            window.location.href = "/new_flowchart";
        });
    </script>
</body>
</html>
